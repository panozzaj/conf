# Enable mouse support
set -g mouse on

# Enable 256 colors
set -g default-terminal "screen-256color"

# Dim inactive panes - disabled (breaks light theme over SSH, no clean way to detect)
# set -g window-style 'bg=#1a1a1a'
# set -g window-active-style 'bg=#000000'

# Show pane border indicators (adds arrows)
set -g pane-border-indicators arrows

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# PageUp enters copy mode and scrolls up immediately
bind PageUp copy-mode -eu

# Prefix + Enter for quick copy mode (easier than prefix + [)
bind Enter copy-mode
